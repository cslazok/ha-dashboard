<script>
    let allData = [], chart = null;

    async function loadData() {
        const btn = document.querySelector('.refresh-btn');
        btn.classList.add('loading');
        document.getElementById('status-text').textContent = 'Fetching demo data...';

        try {
            const response = await fetch('./demo-live.json');
            allData = await response.json();

            document.getElementById('status-text').textContent = 'Demo mode · GitHub Pages dataset';
            document.getElementById('last-updated').textContent =
                'Updated ' + new Date().toLocaleTimeString('en-GB');

            renderTable();
        } catch (e) {
            document.getElementById('status-text').textContent = 'Could not load demo-live.json';
            document.getElementById('data-table').innerHTML =
                '<tr><td colspan="3" class="empty-state">No demo data found</td></tr>';
        }

        btn.classList.remove('loading');
    }

    function getFiltered() {
        const from = document.getElementById('filter-from').value;
        const to = document.getElementById('filter-to').value;
        const limit = parseInt(document.getElementById('filter-limit').value);

        let filtered = [...allData].reverse().filter(row => {
            const t = new Date(row.ts);
            const hhmm = t.getHours().toString().padStart(2, '0') + ':' + t.getMinutes().toString().padStart(2, '0');
            if (from && hhmm < from) return false;
            if (to && hhmm > to) return false;
            return true;
        });

        if (limit > 0) filtered = filtered.slice(0, limit);
        return filtered;
    }

    function updateStats(filtered) {
        document.getElementById('stat-records').textContent = allData.length;
        const last = filtered[filtered.length - 1];
        if (!last) return;

        document.getElementById('stat-power').textContent = (last.total_act_power || 0).toFixed(1) + ' W';
        document.getElementById('stat-voltage').textContent = (last.a_voltage || 0).toFixed(1) + ' V';
        document.getElementById('stat-current').textContent = (last.total_current || 0).toFixed(2) + ' A';
    }

    function renderChart(filtered) {
        const chartType = document.getElementById('chart-type').value;
        const labels = filtered.map(r =>
            new Date(r.ts).toLocaleTimeString('en-GB', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            })
        );

        if (chart) chart.destroy();

        Chart.defaults.color = '#6b6b80';
        Chart.defaults.borderColor = 'rgba(42,42,58,0.6)';

        chart = new Chart(document.getElementById('chart'), {
            type: chartType,
            data: {
                labels,
                datasets: [
                    {
                        label: 'Total Power (W)',
                        data: filtered.map(r => r.total_act_power || 0),
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255,107,107,0.15)',
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2,
                        yAxisID: 'yPower'
                    },
                    {
                        label: 'Voltage A (V)',
                        data: filtered.map(r => r.a_voltage || 0),
                        borderColor: '#6bb8ff',
                        backgroundColor: 'rgba(107,184,255,0.15)',
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2,
                        yAxisID: 'yVoltage'
                    }
                ]
            },
            options: {
                responsive: true,
                animation: { duration: 400 },
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        labels: {
                            font: { family: 'Space Mono', size: 10 },
                            boxWidth: 12,
                            padding: 16
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            font: { family: 'Space Mono', size: 9 },
                            maxTicksLimit: 8
                        },
                        grid: { color: 'rgba(42,42,58,0.4)' }
                    },
                    yPower: {
                        position: 'left',
                        ticks: { font: { family: 'Space Mono', size: 9 } },
                        grid: { color: 'rgba(42,42,58,0.4)' },
                        title: {
                            display: true,
                            text: 'W',
                            font: { family: 'Space Mono', size: 9 },
                            color: '#6b6b80'
                        }
                    },
                    yVoltage: {
                        position: 'right',
                        ticks: { font: { family: 'Space Mono', size: 9 } },
                        grid: { drawOnChartArea: false },
                        title: {
                            display: true,
                            text: 'V',
                            font: { family: 'Space Mono', size: 9 },
                            color: '#6b6b80'
                        }
                    }
                }
            }
        });
    }

    function renderTable() {
        const filtered = getFiltered();
        document.getElementById('record-count').textContent = filtered.length + ' records';
        updateStats(filtered);
        renderChart(filtered);

        const tbody = document.getElementById('data-table');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No data for selected range</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        filtered.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="val-time">${new Date(row.ts).toLocaleTimeString('en-GB')}</td>
                <td class="val-power">${(row.total_act_power || 0).toFixed(3)} W</td>
                <td class="val-voltage">${(row.a_voltage || 0).toFixed(1)} V</td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('filter-from').addEventListener('change', renderTable);
    document.getElementById('filter-to').addEventListener('change', renderTable);
    document.getElementById('filter-limit').addEventListener('change', renderTable);
    document.getElementById('chart-type').addEventListener('change', renderTable);

    loadData();
    setInterval(loadData, 30000);
</script>
