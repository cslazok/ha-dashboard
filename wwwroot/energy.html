<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
    <title>Energy Monitor - Energia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Energia összesítő</h1>
            <a href="index.html" class="btn btn-outline-secondary">← Vissza a mérésekhez</a>
        </div>

        <div class="row mb-3 align-items-end">
            <div class="col-auto">
                <label class="form-label">Időpont tól</label>
                <input type="time" id="filter-from" class="form-control">
            </div>
            <div class="col-auto">
                <label class="form-label">Időpont ig</label>
                <input type="time" id="filter-to" class="form-control">
            </div>
            <div class="col-auto">
                <label class="form-label">Megjelenítés</label>
                <select id="filter-limit" class="form-select">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="0">Mind</option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label">Diagram típus</label>
                <select id="chart-type" class="form-select">
                    <option value="line">Vonaldiagram</option>
                    <option value="bar">Oszlopdiagram</option>
                </select>
            </div>
            <div class="col-auto">
                <button onclick="loadData()" class="btn btn-primary">Adatok frissítése</button>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <canvas id="chart" height="100"></canvas>
            </div>
        </div>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Időpont</th>
                    <th>Import (kWh)</th>
                    <th>Export (kWh)</th>
                    <th>Nettó (kWh)</th>
                    <th>Összesen aktív</th>
                    <th>Visszatáplált</th>
                </tr>
            </thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>

    <script>
        let allData = [];
        let chart = null;

        async function loadData() {
            const response = await fetch('/api/energy');
            allData = await response.json();
            renderTable();
        }

        function getFiltered() {
            const from = document.getElementById('filter-from').value;
            const to = document.getElementById('filter-to').value;
            const limit = parseInt(document.getElementById('filter-limit').value);

            let filtered = [...allData].reverse().filter(row => {
                const time = new Date(row.ts).toLocaleTimeString('hu-HU', {hour: '2-digit', minute: '2-digit'});
                if (from && time < from) return false;
                if (to && time > to) return false;
                return true;
            });

            if (limit > 0) filtered = filtered.slice(0, limit);
            return filtered;
        }

        function renderChart(filtered) {
            const chartType = document.getElementById('chart-type').value;
            const labels = filtered.map(row => new Date(row.ts).toLocaleTimeString('hu-HU'));

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById('chart'), {
                type: chartType,
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Import (kWh)',
                            data: filtered.map(r => r.import_total_kwh || 0),
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            tension: 0.3
                        },
                        {
                            label: 'Export (kWh)',
                            data: filtered.map(r => r.export_total_kwh || 0),
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            tension: 0.3
                        },
                        {
                            label: 'Nettó (kWh)',
                            data: filtered.map(r => r.net_total_kwh || 0),
                            borderColor: 'rgba(255, 206, 86, 1)',
                            backgroundColor: 'rgba(255, 206, 86, 0.2)',
                            tension: 0.3
                        },
                        {
                            label: 'Összesen aktív',
                            data: filtered.map(r => r.total_act || 0),
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.2)',
                            tension: 0.3
                        },
                        {
                            label: 'Visszatáplált',
                            data: filtered.map(r => r.total_act_ret || 0),
                            borderColor: 'rgba(153, 102, 255, 1)',
                            backgroundColor: 'rgba(153, 102, 255, 0.2)',
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { title: { display: true, text: 'Érték' } }
                    }
                }
            });
        }

        function renderTable() {
            const filtered = getFiltered();
            renderChart(filtered);

            const tbody = document.getElementById('data-table');
            tbody.innerHTML = '';
            filtered.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(row.ts).toLocaleTimeString('hu-HU')}</td>
                    <td>${(row.import_total_kwh || 0).toFixed(3)}</td>
                    <td>${(row.export_total_kwh || 0).toFixed(3)}</td>
                    <td>${(row.net_total_kwh || 0).toFixed(3)}</td>
                    <td>${(row.total_act || 0).toFixed(3)}</td>
                    <td>${(row.total_act_ret || 0).toFixed(3)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('filter-from').addEventListener('change', renderTable);
        document.getElementById('filter-to').addEventListener('change', renderTable);
        document.getElementById('filter-limit').addEventListener('change', renderTable);
        document.getElementById('chart-type').addEventListener('change', renderTable);

        loadData();
    </script>
</body>
</html>
